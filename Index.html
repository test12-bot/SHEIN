<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHEIN Cosmetics Store - نظام السحوبات</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>SHEIN</h1>
        <div class="subtitle">COSMETICS STORE - ADMIN PANEL</div>
    </header>

    <div class="container">
        <h2>نظام السحب الآلي</h2>
        <p>أدخل رابط الريلز لاختيار فائز عشوائي من التعليقات مع إظهار حساب الفائز.</p>
        
        <input type="text" id="reelUrl" placeholder="https://www.instagram.com/reel/...">
        <button id="drawBtn" onclick="startDraw()">سحب الفائز الآن</button>

        <div id="suspenseBox">@username</div>

        <div id="result">
            <img src="" alt="صورة الفائز" class="winner-image" id="winnerImg">
            <h3 style="margin-top: 0; color: #555;">🎉 الفائز بالجائزة 🎉</h3>
            <div class="winner-name" id="winnerName">@username</div>
            <div class="winner-comment" id="winnerComment">"تعليق الفائز"</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
